<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villages - HealthWatch</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">HealthWatch</div>
        <div class="nav-links">
            <span id="userName"></span>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="dashboard-layout">

        <aside class="sidebar">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="villages.html" class="active">Villages</a>
            <a href="alerts.html">Alerts</a>
            <a href="reports.html">Reports</a>
            <a href="awareness.html">Awareness</a>
        </aside>

        <main class="main-content">
            <h1>Villages</h1>

            <button id="addVillageBtn" class="btn-primary">+ Add Village</button>

            <div id="villageFormContainer" class="form-container" style="display: none;">
                <form id="villageForm" class="report-form">
                    <div id="errorMessage" class="error-message"></div>

                    <label for="villageName">Village Name</label>
                    <input type="text" id="villageName" required>

                    <label for="district">District</label>
                    <input type="text" id="district" required>

                    <label for="state">State</label>
                    <input type="text" id="state" required>

                    <label for="population">Population</label>
                    <input type="number" id="population" min="0">

                    <label for="latitude">Latitude</label>
                    <input type="number" id="latitude" step="any" required>

                    <label for="longitude">Longitude</label>
                    <input type="number" id="longitude" step="any" required>

                    <button type="submit" class="btn-primary">Save Village</button>
                </form>
            </div>

            <div class="dashboard-panel">
                <table id="villagesTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>District</th>
                            <th>State</th>
                            <th>Population</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/villages.js"></script>
</body>
</html>
